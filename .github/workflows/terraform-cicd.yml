name: Terraform CI/CD (GCP + WIF)

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "infra/terraform/**"
      - "shadow-cljs.edn"
      - "deps.edn"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/terraform-cicd.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "infra/terraform/**"
      - "shadow-cljs.edn"
      - "deps.edn"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/terraform-cicd.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_WORKING_DIR: infra/terraform
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_bucket_name: labs-insidefreecoding-com-br-prod-461714
  TF_VAR_enable_https: "true"
  TF_VAR_domains: '["labs.insidefreecoding.com.br"]'
  TF_VAR_managed_zone: ${{ vars.GCP_DNS_ZONE }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Install JS dependencies
        run: npm ci
        working-directory: .

      - name: Build static assets
        run: npx shadow-cljs release app
        working-directory: .

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Install JS dependencies
        run: npm ci
        working-directory: .

      - name: Build static assets
        run: npx shadow-cljs release app
        working-directory: .

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache inside-free-coding-notes-url-map --path="/index.html" --host="labs.insidefreecoding.com.br" --async
          gcloud compute url-maps invalidate-cdn-cache inside-free-coding-notes-url-map --path="/js/*" --host="labs.insidefreecoding.com.br" --async
          gcloud compute url-maps invalidate-cdn-cache inside-free-coding-notes-url-map --path="/styles/*" --host="labs.insidefreecoding.com.br" --async
          gcloud compute url-maps invalidate-cdn-cache inside-free-coding-notes-url-map --path="/content/*" --host="labs.insidefreecoding.com.br" --async
          gcloud compute url-maps invalidate-cdn-cache inside-free-coding-notes-url-map --path="/assets/*" --host="labs.insidefreecoding.com.br" --async
